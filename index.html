<html>

<head>
    <title>Fastscrap</title>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1+Code:wght@100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="container">
        <div class="topbar">
            <div class="menu">
                <span class="menu-button">ファイル</span>
                <div class="dropdown">
                    <div class="item" id="fileSave">保存</div>
                    <div class="item" id="fileLoad">読み込み</div>
                </div>
            </div>

            <div class="menu">
                <span class="menu-button">挿入</span>
                <div class="dropdown">
                    <div class="item" id="importImage">画像</div>
                </div>
            </div>
        </div>
        <div class="main" contenteditable="true">
        </div>
        <input type="file" id="fileInput" accept="image/*">
    </div>
</body>
<!-- 画像圧縮DOM -->
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression"></script>
<script>
    const main = document.querySelector(".main");
    const buttons = document.querySelectorAll(".menu-button");
</script>
<script type="module" src="/js/config.js"></script>
<script type="module" src="/js/dropdown.js"></script>
<script type="module" src="/js/image.js"></script>
<script type="module" src="/js/storage.js"></script>
<script type="module" src="/js/youtube-preview.js"></script>
</html>

</html>
